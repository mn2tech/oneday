<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Christian Nalugu Celebration 2026</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Lato:wght@300;400;700&family=Dancing+Script:wght@700&display=swap');

    :root {
      --gold: #c9a84c;
      --gold-light: #f0d080;
      --gold-dark: #8a6a1a;
      --cream: #fdf8ee;
      --ivory: #fffdf5;
      --brown-dark: #2c1a0e;
      --brown-mid: #5c3d1e;
      --brown-light: #8b6340;
      --accent-green: #4a7c59;
      --accent-red: #b5341b;
      --accent-orange: #d4702a;
      --text-dark: #1a0f05;
      --text-mid: #4a3520;
      --text-light: #8b7355;
      --white: #ffffff;
      --shadow: 0 8px 32px rgba(44,26,14,0.18);
      --shadow-sm: 0 2px 12px rgba(44,26,14,0.10);
      --radius: 16px;
      --radius-sm: 8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Lato', sans-serif;
      background: var(--cream);
      color: var(--text-dark);
      overflow-x: hidden;
    }

    /* ─── NAV ─── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(44,26,14,0.95);
      backdrop-filter: blur(10px);
      padding: 0 1rem;
      display: flex; align-items: center; justify-content: space-between;
      height: 60px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.4);
    }
    .nav-logo {
      font-family: 'Dancing Script', cursive;
      color: var(--gold-light);
      font-size: 1.4rem;
      text-decoration: none;
    }
    .nav-links {
      display: flex; gap: 0.2rem; list-style: none;
    }
    .nav-links a {
      color: var(--gold-light);
      text-decoration: none;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.4rem 0.55rem;
      border-radius: var(--radius-sm);
      transition: background 0.2s, color 0.2s;
    }
    .nav-links a:hover { background: var(--gold); color: var(--brown-dark); }

    /* ─── HERO ─── */
    .hero {
      min-height: 100vh;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(201,168,76,0.18) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(180,100,30,0.15) 0%, transparent 55%),
        linear-gradient(160deg, #1a0a02 0%, #3a1f08 35%, #2c1505 70%, #1a0a02 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center;
      padding: 100px 1.5rem 4rem;
      position: relative; overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute; inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9a84c' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      pointer-events: none;
    }
    .hero-ornament {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .hero-subtitle {
      font-family: 'Dancing Script', cursive;
      color: var(--gold-light);
      font-size: clamp(1.2rem, 4vw, 1.8rem);
      margin-bottom: 0.5rem;
      opacity: 0.9;
    }
    .hero-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 8vw, 5.5rem);
      font-weight: 900;
      color: var(--white);
      line-height: 1.1;
      margin-bottom: 0.4rem;
      text-shadow: 0 4px 30px rgba(201,168,76,0.5);
    }
    .hero-title span { color: var(--gold-light); }
    .hero-celebration {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(1.5rem, 5vw, 3rem);
      color: var(--gold);
      margin-bottom: 1.5rem;
    }
    .hero-meta {
      display: flex; flex-wrap: wrap; gap: 1rem; justify-content: center;
      margin-bottom: 2.5rem;
    }
    .hero-badge {
      background: rgba(201,168,76,0.15);
      border: 1px solid rgba(201,168,76,0.4);
      border-radius: 50px;
      padding: 0.5rem 1.2rem;
      color: var(--gold-light);
      font-size: 0.9rem;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .countdown-container {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: var(--radius);
      padding: 1.5rem 2rem;
      backdrop-filter: blur(10px);
    }
    .countdown-label {
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1rem;
    }
    .countdown-grid {
      display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;
    }
    .countdown-item {
      display: flex; flex-direction: column; align-items: center; min-width: 60px;
    }
    .countdown-num {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 900;
      color: var(--white);
      line-height: 1;
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .countdown-unit {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-light);
      margin-top: 0.3rem;
    }
    .countdown-sep {
      font-size: 2.5rem;
      color: var(--gold);
      opacity: 0.5;
      align-self: flex-start;
      padding-top: 0.1rem;
    }
    .scroll-hint {
      position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
      color: var(--gold);
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.7;
      animation: bounce 2s infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(8px); }
    }

    /* ─── SECTIONS ─── */
    section { padding: 5rem 1.5rem; }
    .section-header {
      text-align: center; margin-bottom: 3rem;
    }
    .section-tag {
      display: inline-block;
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold-dark);
      background: rgba(201,168,76,0.12);
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 50px;
      padding: 0.3rem 1rem;
      margin-bottom: 0.8rem;
    }
    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 700;
      color: var(--brown-dark);
      margin-bottom: 0.5rem;
    }
    .section-divider {
      width: 60px; height: 3px;
      background: linear-gradient(90deg, var(--gold), var(--gold-light));
      margin: 0.8rem auto 0;
      border-radius: 2px;
    }

    /* ─── SCHEDULE ─── */
    #schedule { background: var(--ivory); }
    .timeline {
      max-width: 700px; margin: 0 auto;
      position: relative;
    }
    .timeline::before {
      content: '';
      position: absolute; left: 24px; top: 0; bottom: 0; width: 2px;
      background: linear-gradient(180deg, var(--gold), rgba(201,168,76,0.2));
    }
    @media (min-width: 600px) {
      .timeline::before { left: 50%; transform: translateX(-50%); }
    }
    .tl-item {
      display: flex; gap: 1.5rem; margin-bottom: 2.5rem;
      position: relative; padding-left: 60px;
      animation: fadeUp 0.6s ease both;
    }
    @media (min-width: 600px) {
      .tl-item { padding-left: 0; }
      .tl-item:nth-child(even) { flex-direction: row-reverse; }
      .tl-item:nth-child(even) .tl-card { text-align: right; }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .tl-dot {
      position: absolute; left: 17px; top: 18px;
      width: 16px; height: 16px;
      background: var(--gold);
      border-radius: 50%;
      border: 3px solid var(--ivory);
      box-shadow: 0 0 0 2px var(--gold);
      flex-shrink: 0; z-index: 1;
    }
    @media (min-width: 600px) {
      .tl-dot { left: 50%; transform: translateX(-50%); }
    }
    .tl-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 1.2rem 1.5rem;
      box-shadow: var(--shadow-sm);
      border-left: 4px solid var(--gold);
      transition: transform 0.2s, box-shadow 0.2s;
      flex: 1;
    }
    @media (min-width: 600px) {
      .tl-card { max-width: 45%; }
      .tl-item:nth-child(even) .tl-card { border-left: none; border-right: 4px solid var(--gold); }
    }
    .tl-card:hover { transform: translateY(-3px); box-shadow: var(--shadow); }
    .tl-time {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--gold-dark);
      text-transform: uppercase;
      margin-bottom: 0.3rem;
    }
    .tl-event {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--brown-dark);
      margin-bottom: 0.3rem;
    }
    .tl-desc {
      font-size: 0.85rem;
      color: var(--text-light);
      line-height: 1.5;
    }
    .tl-icon { font-size: 1.3rem; margin-bottom: 0.3rem; }

    /* ─── PHOTO WALL ─── */
    #photos { background: var(--brown-dark); }
    #photos .section-title { color: var(--gold-light); }
    #photos .section-tag { color: var(--gold-light); background: rgba(255,255,255,0.07); border-color: rgba(201,168,76,0.2); }
    #photos .section-divider { background: linear-gradient(90deg, var(--gold-light), var(--gold)); }
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.8rem;
      max-width: 900px; margin: 0 auto;
    }
    @media (min-width: 480px) { .photo-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 768px) { .photo-grid { grid-template-columns: repeat(4, 1fr); } }
    .photo-tile {
      aspect-ratio: 1;
      border-radius: var(--radius-sm);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-size: 2rem;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
      position: relative; overflow: hidden;
    }
    .photo-tile:hover { transform: scale(1.05); box-shadow: 0 8px 25px rgba(0,0,0,0.4); }
    .photo-tile span.label {
      font-size: 0.65rem;
      margin-top: 0.4rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.7;
    }
    .photo-tile.featured {
      grid-column: span 2;
      grid-row: span 2;
      font-size: 3.5rem;
    }
    .photo-tile.featured span.label { font-size: 0.8rem; }

    /* ─── RSVP ─── */
    #rsvp { background: linear-gradient(135deg, #fdf3d8 0%, #fff9ed 100%); }
    .rsvp-card {
      max-width: 480px; margin: 0 auto;
      background: var(--white);
      border-radius: var(--radius);
      padding: 2.5rem;
      box-shadow: var(--shadow);
      text-align: center;
      border-top: 5px solid var(--gold);
    }
    .rsvp-counter {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3.5rem, 12vw, 5.5rem);
      font-weight: 900;
      color: var(--gold-dark);
      line-height: 1;
      margin-bottom: 0.3rem;
    }
    .rsvp-text {
      font-size: 1rem;
      color: var(--text-mid);
      margin-bottom: 2rem;
      font-style: italic;
    }
    .rsvp-btn {
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      color: var(--white);
      border: none;
      border-radius: 50px;
      padding: 1rem 2.5rem;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
      box-shadow: 0 4px 15px rgba(201,168,76,0.4);
    }
    .rsvp-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(201,168,76,0.5); }
    .rsvp-btn:active { transform: translateY(0); }
    .rsvp-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .rsvp-note {
      margin-top: 1rem;
      font-size: 0.8rem;
      color: var(--text-light);
    }
    .rsvp-pulse {
      animation: pulse 0.4s ease;
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    /* ─── POLL ─── */
    #poll { background: var(--ivory); }
    .poll-card {
      max-width: 550px; margin: 0 auto;
      background: var(--white);
      border-radius: var(--radius);
      padding: 2rem;
      box-shadow: var(--shadow);
      border-top: 5px solid var(--accent-green);
    }
    .poll-question {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--brown-dark);
      margin-bottom: 1.5rem;
      line-height: 1.4;
    }
    .poll-options { display: flex; flex-direction: column; gap: 0.8rem; }
    .poll-option {
      position: relative;
      border: 2px solid #e8e0d0;
      border-radius: var(--radius-sm);
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.2s;
      min-height: 52px;
      display: flex; align-items: center;
    }
    .poll-option:hover { border-color: var(--accent-green); }
    .poll-option.voted { border-color: var(--accent-green); cursor: default; }
    .poll-bar {
      position: absolute; left: 0; top: 0; bottom: 0;
      background: linear-gradient(90deg, rgba(74,124,89,0.15), rgba(74,124,89,0.08));
      transition: width 0.7s cubic-bezier(.4,0,.2,1);
      border-radius: 4px 0 0 4px;
    }
    .poll-option-inner {
      position: relative; z-index: 1;
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; padding: 0.75rem 1rem;
    }
    .poll-opt-label { font-size: 0.95rem; font-weight: 600; color: var(--brown-dark); display: flex; align-items: center; gap: 0.5rem; }
    .poll-opt-pct { font-size: 0.85rem; font-weight: 700; color: var(--accent-green); }
    .poll-total { margin-top: 1rem; font-size: 0.8rem; color: var(--text-light); text-align: right; }
    .poll-voted-badge {
      display: inline-block;
      background: rgba(74,124,89,0.12);
      color: var(--accent-green);
      font-size: 0.75rem;
      font-weight: 700;
      padding: 0.2rem 0.6rem;
      border-radius: 50px;
      margin-left: 0.5rem;
    }

    /* ─── MESSAGES ─── */
    #messages { background: linear-gradient(135deg, #1a0a02 0%, #2c1505 100%); }
    #messages .section-title { color: var(--gold-light); }
    #messages .section-tag { color: var(--gold-light); background: rgba(255,255,255,0.07); border-color: rgba(201,168,76,0.2); }
    #messages .section-divider { background: linear-gradient(90deg, var(--gold-light), var(--gold)); }
    .message-form {
      max-width: 600px; margin: 0 auto 2.5rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: var(--radius);
      padding: 1.8rem;
      backdrop-filter: blur(10px);
    }
    .form-row { display: flex; gap: 1rem; flex-wrap: wrap; }
    .form-group { flex: 1; min-width: 140px; display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1rem; }
    .form-group label { font-size: 0.78rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); }
    .form-group input, .form-group textarea {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: var(--radius-sm);
      padding: 0.75rem 1rem;
      color: var(--white);
      font-family: 'Lato', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      resize: none;
    }
    .form-group input::placeholder, .form-group textarea::placeholder { color: rgba(255,255,255,0.3); }
    .form-group input:focus, .form-group textarea:focus {
      border-color: var(--gold);
      background: rgba(255,255,255,0.1);
    }
    .form-emoji-row {
      display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem;
    }
    .emoji-btn {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: var(--radius-sm);
      padding: 0.4rem 0.7rem;
      font-size: 1.1rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .emoji-btn:hover { background: rgba(201,168,76,0.2); transform: scale(1.15); }
    .emoji-btn.selected { background: rgba(201,168,76,0.3); border-color: var(--gold); }
    .submit-btn {
      width: 100%;
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      color: var(--white);
      border: none;
      border-radius: 50px;
      padding: 0.9rem;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 15px rgba(201,168,76,0.3);
    }
    .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(201,168,76,0.4); }
    .messages-grid {
      max-width: 900px; margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
    }
    .msg-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(201,168,76,0.15);
      border-radius: var(--radius);
      padding: 1.3rem;
      backdrop-filter: blur(5px);
      animation: fadeUp 0.4s ease both;
      transition: transform 0.2s;
    }
    .msg-card:hover { transform: translateY(-3px); }
    .msg-header {
      display: flex; align-items: center; gap: 0.7rem; margin-bottom: 0.8rem;
    }
    .msg-avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; font-weight: 700; color: var(--white);
      flex-shrink: 0;
    }
    .msg-name { font-weight: 700; font-size: 0.9rem; color: var(--gold-light); }
    .msg-time { font-size: 0.72rem; color: rgba(255,255,255,0.35); }
    .msg-emoji-display { font-size: 1.4rem; margin-left: auto; }
    .msg-text { font-size: 0.88rem; color: rgba(255,255,255,0.8); line-height: 1.55; }
    .no-messages {
      text-align: center;
      color: rgba(255,255,255,0.35);
      font-style: italic;
      grid-column: 1/-1;
      padding: 2rem;
    }

    /* ─── FOOTER ─── */
    footer {
      background: #100600;
      color: rgba(255,255,255,0.4);
      text-align: center;
      padding: 2rem 1.5rem;
      font-size: 0.82rem;
    }
    footer .footer-heart { color: var(--gold); font-size: 1.1rem; }
    footer .footer-title {
      font-family: 'Dancing Script', cursive;
      font-size: 1.3rem;
      color: var(--gold-light);
      margin-bottom: 0.5rem;
    }

    /* ─── TOAST ─── */
    .toast {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px);
      background: var(--brown-dark);
      color: var(--gold-light);
      border: 1px solid var(--gold);
      border-radius: 50px;
      padding: 0.8rem 1.8rem;
      font-size: 0.9rem;
      font-weight: 600;
      z-index: 9999;
      transition: transform 0.4s cubic-bezier(.4,0,.2,1);
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 480px) {
      .nav-links { display: none; }
      .hero-badge { font-size: 0.8rem; padding: 0.4rem 0.9rem; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="#" class="nav-logo">✦ Christian</a>
  <ul class="nav-links">
    <li><a href="#schedule">Schedule</a></li>
    <li><a href="#photos">Photos</a></li>
    <li><a href="#rsvp">RSVP</a></li>
    <li><a href="#poll">Poll</a></li>
    <li><a href="#messages">Wishes</a></li>
  </ul>
</nav>

<!-- HERO -->
<section class="hero" id="home">
